name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create a GitHub Release and Tag

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessary to fetch all tags for versioning

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install NPM Dependencies
        run: npm install

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create .env file
        # Expo Public variables are baked into the JS bundle during 'prebuild' and 'assemble'
        # These secrets should be added to your GitHub Repository Settings
        run: |
          echo "EXPO_PUBLIC_API_URL=${{ secrets.EXPO_PUBLIC_API_URL }}" >> .env
          echo "EXPO_PUBLIC_API_TIMEOUT=${{ secrets.EXPO_PUBLIC_API_TIMEOUT }}" >> .env
          echo "EXPO_PUBLIC_DEFAULT_FLEET_ID=${{ secrets.EXPO_PUBLIC_DEFAULT_FLEET_ID }}" >> .env
          echo "EXPO_PUBLIC_DEFAULT_USER_ID=${{ secrets.EXPO_PUBLIC_DEFAULT_USER_ID }}" >> .env
          echo "EXPO_PUBLIC_DEFAULT_DRIVER_ID=${{ secrets.EXPO_PUBLIC_DEFAULT_DRIVER_ID }}" >> .env
          echo "EXPO_PUBLIC_DEFAULT_LAT=${{ secrets.EXPO_PUBLIC_DEFAULT_LAT }}" >> .env
          echo "EXPO_PUBLIC_DEFAULT_LNG=${{ secrets.EXPO_PUBLIC_DEFAULT_LNG }}" >> .env
          echo "EXPO_PUBLIC_ENV=${{ secrets.EXPO_PUBLIC_ENV }}" >> .env

      - name: Generate Native Android Project
        run: npx expo prebuild --platform android --clean --no-install

      - name: Grant execute permission for gradlew
        working-directory: ./android
        run: chmod +x gradlew

      - name: Build Android Debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/Voltlink-mobile.apk

      - name: Get Next Version Tag
        id: next_version
        run: |
          LATEST_TAG=$(git tag -l "v0.*" | sort -V | tail -n1)
          if [ -z "$LATEST_TAG" ]; then
            NEXT_TAG="v0.1"
          else
            # Extract the number after v0. and increment it
            VERSION_NUM=$(echo $LATEST_TAG | sed 's/v0\.//')
            NEXT_NUM=$((VERSION_NUM + 1))
            NEXT_TAG="v0.$NEXT_NUM"
          fi
          echo "tag=$NEXT_TAG" >> $GITHUB_OUTPUT
          echo "Determined next version: $NEXT_TAG"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Voltlink-mobile
          path: android/app/build/outputs/apk/debug/Voltlink-mobile.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.next_version.outputs.tag }}
          name: Release ${{ steps.next_version.outputs.tag }}
          body: 'Auto-generated Android APK from the latest push to the main branch.'
          prerelease: false
          files: android/app/build/outputs/apk/debug/Voltlink-mobile.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
